<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TX Science | Singapore MOE Primary Science Learning Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pri: #2e7d32;
            --pri-light: #4caf50;
            --pri-dark: #1b5e20;
            --accent: #ff8f00;
            --accent-light: #ffb74d;
            --secondary: #0288d1;
            --text-dark: #212121;
            --text-light: #757575;
            --bg-light: #f5f5f5;
            --bg-white: #ffffff;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.14);
            --radius: 14px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: var(--bg-light);
            min-height: 100vh;
        }

        /* ── Hero ── */
        .hero {
            background: linear-gradient(135deg, var(--pri-dark) 0%, var(--pri) 50%, var(--pri-light) 100%);
            color: #fff;
            padding: 56px 24px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -60%; left: -20%;
            width: 140%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        .hero p  { font-size: 1.1rem; opacity: 0.9; max-width: 560px; margin: 0 auto 28px; }

        /* ── Search bar ── */
        .search-wrap {
            max-width: 520px;
            margin: 0 auto;
            position: relative;
        }
        .search-wrap svg {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; stroke: var(--text-light); fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        .search-wrap input {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            transition: box-shadow .2s;
        }
        .search-wrap input:focus { box-shadow: 0 4px 24px rgba(0,0,0,0.25); }

        /* ── Container ── */
        .container { max-width: 1120px; margin: 0 auto; padding: 0 20px; }

        /* ── Level tabs ── */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: -22px auto 0;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
            padding: 0 12px;
        }
        .tab-btn {
            padding: 10px 26px;
            border: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            background: var(--bg-white);
            color: var(--text-dark);
            box-shadow: var(--shadow);
            transition: all .2s;
        }
        .tab-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
        .tab-btn.active {
            background: var(--pri);
            color: #fff;
            box-shadow: 0 4px 14px rgba(46,125,50,0.4);
        }

        /* ── Stats strip ── */
        .stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 32px 0 8px;
            flex-wrap: wrap;
        }
        .stat { text-align: center; }
        .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--pri); }
        .stat-label { font-size: 0.82rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }

        /* ── Level sections ── */
        .level-section { margin: 36px 0 0; }
        .level-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 18px;
        }
        .level-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 12px;
            font-weight: 700; font-size: 1rem; color: #fff; flex-shrink: 0;
        }
        .level-badge.p3 { background: #43a047; }
        .level-badge.p4 { background: #1e88e5; }
        .level-badge.p5 { background: #8e24aa; }
        .level-badge.p6 { background: #e65100; }
        .level-title { font-size: 1.25rem; font-weight: 600; }

        /* ── Cards grid ── */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--bg-white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform .22s, box-shadow .22s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

        .card-color {
            height: 6px;
            width: 100%;
        }
        .card-color.p3 { background: linear-gradient(90deg, #43a047, #66bb6a); }
        .card-color.p4 { background: linear-gradient(90deg, #1e88e5, #42a5f5); }
        .card-color.p5 { background: linear-gradient(90deg, #8e24aa, #ab47bc); }
        .card-color.p6 { background: linear-gradient(90deg, #e65100, #ff7043); }

        .card-body {
            padding: 20px 22px 22px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .card-num {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
        }
        .card-title {
            font-size: 1.08rem;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 0.88rem;
            color: var(--text-light);
            line-height: 1.5;
            flex: 1;
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 22px;
            border-top: 1px solid var(--border);
            font-size: 0.82rem;
            color: var(--text-light);
        }
        .card-footer .level-pill {
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #fff;
        }
        .level-pill.p3 { background: #43a047; }
        .level-pill.p4 { background: #1e88e5; }
        .level-pill.p5 { background: #8e24aa; }
        .level-pill.p6 { background: #e65100; }

        .card-arrow {
            display: inline-flex; align-items: center; gap: 4px;
            font-weight: 600; color: var(--pri);
        }

        /* ── No results ── */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
            display: none;
        }
        .no-results svg { width: 56px; height: 56px; stroke: var(--border); fill: none; stroke-width: 1.5; margin-bottom: 12px; }
        .no-results p { font-size: 1.1rem; }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 40px 20px 28px;
            color: var(--text-light);
            font-size: 0.85rem;
            margin-top: 48px;
            border-top: 1px solid var(--border);
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card { animation: fadeUp .4s ease both; }
        .cards .card:nth-child(1) { animation-delay: .04s; }
        .cards .card:nth-child(2) { animation-delay: .08s; }
        .cards .card:nth-child(3) { animation-delay: .12s; }
        .cards .card:nth-child(4) { animation-delay: .16s; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .hero h1 { font-size: 1.6rem; }
            .hero { padding: 40px 16px 32px; }
            .tabs { gap: 6px; }
            .tab-btn { padding: 8px 16px; font-size: 0.85rem; }
            .stats { gap: 20px; }
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Hero -->
<header class="hero">
    <h1>TX Science Learning Hub</h1>
    <p>Singapore MOE Primary Science &mdash; Interactive lessons from P3 to P6</p>
    <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Search topics... e.g. magnets, light, forces" autocomplete="off">
    </div>
</header>

<!-- Level Tabs -->
<nav class="tabs" id="tabs">
    <button class="tab-btn active" data-level="all">All Topics</button>
    <button class="tab-btn" data-level="P3">Primary 3</button>
    <button class="tab-btn" data-level="P4">Primary 4</button>
    <button class="tab-btn" data-level="P5">Primary 5</button>
    <button class="tab-btn" data-level="P6">Primary 6</button>
</nav>

<!-- Stats -->
<div class="container">
    <div class="stats">
        <div class="stat"><div class="stat-num" id="stat-total">18</div><div class="stat-label">Topics</div></div>
        <div class="stat"><div class="stat-num">4</div><div class="stat-label">Levels</div></div>
        <div class="stat"><div class="stat-num" id="stat-shown">18</div><div class="stat-label">Showing</div></div>
    </div>
</div>

<!-- Topic Cards -->
<main class="container" id="main"></main>

<!-- No results -->
<div class="no-results" id="no-results">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <p>No topics match your search.</p>
</div>

<footer>TX Science &copy; 2026 &middot; Singapore MOE Primary Science Learning Resources</footer>

<script>
const TOPICS = [
    { num: 1,  level: "P3", folder: "01_P3_Diversity_of_Living_and_Non-Living_Things", title: "Diversity of Living and Non-Living Things", desc: "Explore the characteristics that distinguish living things from non-living things and understand the rich diversity of life." },
    { num: 2,  level: "P3", folder: "02_P3_Diversity_of_Materials", title: "Diversity of Materials", desc: "Discover different types of materials, their properties, and how they are used in everyday life." },
    { num: 3,  level: "P3", folder: "03_P3_Life_Cycles_Plants_and_Animals", title: "Life Cycles of Plants and Animals", desc: "Learn about the stages of growth and development in the life cycles of various plants and animals." },
    { num: 4,  level: "P3", folder: "04_P3_Magnets", title: "Magnets", desc: "Investigate the fascinating properties of magnets \u2014 attraction, repulsion, poles, and everyday applications." },
    { num: 5,  level: "P4", folder: "05_P4_Matter", title: "Matter", desc: "Understand the three states of matter and how heating and cooling cause changes between states." },
    { num: 6,  level: "P4", folder: "06_P4_Light", title: "Light", desc: "Explore how light travels, how shadows form, and understand reflection and refraction." },
    { num: 7,  level: "P4", folder: "07_P4_Heat", title: "Heat", desc: "Learn about heat energy, temperature, conductors, insulators, and how heat is transferred." },
    { num: 8,  level: "P4", folder: "08_P4_Plant_Parts_and_Functions", title: "Plant Parts and Functions", desc: "Study the different parts of a plant and their roles in keeping the plant alive and healthy." },
    { num: 9,  level: "P4", folder: "09_P4_Human_Digestive_System", title: "Human Digestive System", desc: "Follow the journey of food through the human digestive system and understand how nutrients are absorbed." },
    { num: 10, level: "P5", folder: "10_P5_Reproduction_Plants_and_Humans", title: "Reproduction in Plants and Humans", desc: "Understand the processes of reproduction in flowering plants and the human reproductive system." },
    { num: 11, level: "P5", folder: "11_P5_Water", title: "Water", desc: "Explore the water cycle, properties of water, and its importance to living things." },
    { num: 12, level: "P5", folder: "12_P5_Human_Respiratory_and_Circulatory_Systems", title: "Human Respiratory and Circulatory Systems", desc: "Learn how the respiratory and circulatory systems work together to transport oxygen around the body." },
    { num: 13, level: "P5", folder: "13_P5_Plant_Transport_System", title: "Plant Transport System", desc: "Discover how water and nutrients are transported through plants via roots, stems, and leaves." },
    { num: 14, level: "P5", folder: "14_P5_Electrical_System", title: "Electrical System", desc: "Build and understand electrical circuits, conductors, insulators, and series vs parallel connections." },
    { num: 15, level: "P6", folder: "15_P6_Forces", title: "Forces", desc: "Investigate different types of forces, their effects on objects, and concepts like friction and gravity." },
    { num: 16, level: "P6", folder: "16_P6_Interactions_within_the_Environment", title: "Interactions within the Environment", desc: "Study food chains, food webs, and how organisms interact and depend on each other in ecosystems." },
    { num: 17, level: "P6", folder: "17_P6_Photosynthesis", title: "Photosynthesis", desc: "Understand how green plants make their own food using sunlight, water, and carbon dioxide." },
    { num: 18, level: "P6", folder: "18_P6_Energy_Conversion", title: "Energy Conversion", desc: "Explore different forms of energy and how energy is converted from one form to another." }
];

const LEVEL_ORDER = ["P3","P4","P5","P6"];
const main = document.getElementById('main');
const noResults = document.getElementById('no-results');
const statShown = document.getElementById('stat-shown');
let activeLevel = 'all';

function render(filter = '') {
    const q = filter.toLowerCase().trim();
    let filtered = TOPICS.filter(t => {
        const matchLevel = activeLevel === 'all' || t.level === activeLevel;
        const matchSearch = !q || t.title.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.level.toLowerCase().includes(q);
        return matchLevel && matchSearch;
    });

    statShown.textContent = filtered.length;

    if (!filtered.length) {
        main.innerHTML = '';
        noResults.style.display = 'block';
        return;
    }
    noResults.style.display = 'none';

    const grouped = {};
    LEVEL_ORDER.forEach(l => grouped[l] = []);
    filtered.forEach(t => grouped[t.level].push(t));

    let html = '';
    for (const level of LEVEL_ORDER) {
        const items = grouped[level];
        if (!items.length) continue;

        const levelName = { P3: 'Primary 3', P4: 'Primary 4', P5: 'Primary 5', P6: 'Primary 6' }[level];
        html += `
        <section class="level-section">
            <div class="level-header">
                <div class="level-badge ${level.toLowerCase()}">${level}</div>
                <div class="level-title">${levelName} &mdash; ${items.length} topic${items.length > 1 ? 's' : ''}</div>
            </div>
            <div class="cards">
                ${items.map(t => `
                <a class="card" href="${t.folder}/index.html">
                    <div class="card-color ${t.level.toLowerCase()}"></div>
                    <div class="card-body">
                        <div class="card-num">Topic ${String(t.num).padStart(2,'0')}</div>
                        <div class="card-title">${highlight(t.title, q)}</div>
                        <div class="card-desc">${highlight(t.desc, q)}</div>
                    </div>
                    <div class="card-footer">
                        <span class="level-pill ${t.level.toLowerCase()}">${t.level}</span>
                        <span class="card-arrow">Open &rarr;</span>
                    </div>
                </a>`).join('')}
            </div>
        </section>`;
    }
    main.innerHTML = html;
}

function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark style="background:#fff9c4;border-radius:2px;padding:0 2px">$1</mark>');
}

// Tab clicks
document.getElementById('tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeLevel = btn.dataset.level;
    render(document.getElementById('search').value);
});

// Search
document.getElementById('search').addEventListener('input', e => render(e.target.value));

// Initial render
render();
</script>
</body>
</html>
